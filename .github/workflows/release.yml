name: Release Obsidian plugin

# Push a version tag (e.g. `git tag 0.1.0 && git push origin 0.1.0`) and this
# builds the plugin and publishes a GitHub Release with main.js, manifest.json
# and styles.css attached as individual assets — exactly what BRAT and the
# community store expect.

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create release with assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          # Fail early if manifest version doesn't match the tag.
          manifest_version=$(node -p "require('./manifest.json').version")
          if [ "$manifest_version" != "$tag" ]; then
            echo "::error::Tag ($tag) does not match manifest.json version ($manifest_version)"
            exit 1
          fi
          gh release create "$tag" \
            --title="$tag" \
            --notes="Release $tag" \
            main.js manifest.json styles.css
